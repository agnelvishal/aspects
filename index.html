<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T71BBEMMH2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-T71BBEMMH2');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetary Conjunction Finder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-animation"></div>
    <div class="container">
        <header>
            <h1>Find planetary Aspects</h1>
        </header>

        <main>
            <section class="config-panel glass">
                <h2>Configuration</h2>

                <div class="input-group">
                    <label for="startDate">Start Date</label>
                    <input type="date" id="startDate" required>
                </div>

                <div class="input-group">
                    <label for="endDate">End Date</label>
                    <input type="date" id="endDate" required>
                </div>

                <div class="input-group" id="orbSingleContainer">
                    <label for="orb"> Angular Deviation Tolerance (°)</label>
                    <input type="number" id="orb" value="1" step="0.1" min="0" max="15">
                </div>

                <div class="input-group hidden" id="orbOpposedContainer">
                    <label> Angular Deviation Tolerance (°)</label>
                    <div class="orb-opposed-grid">
                        <div class="orb-opposed-item">
                            <label for="orbA">Group A</label>
                            <input type="number" id="orbA" value="1" step="0.1" min="0" max="15">
                        </div>
                        <div class="orb-opposed-item">
                            <label for="orbB">Group B</label>
                            <input type="number" id="orbB" value="1" step="0.1" min="0" max="15">
                        </div>
                        <div class="orb-opposed-item">
                            <label for="orbOpp">Opposition</label>
                            <input type="number" id="orbOpp" value="1" step="0.1" min="0" max="15">
                        </div>
                    </div>
                </div>

                <div class="input-group search-mode-group">
                    <label for="searchMode">Search Mode</label>
                    <select id="searchMode">
                        <option value="conjunct">Conjunction Only</option>
                        <option value="opposed">Conjunction & Opposition</option>
                    </select>
                </div>

                <div class="planets-selection">
                    <div id="groupAContainer" class="planet-group-box">
                        <h3 id="groupALabel">Select Planets (Min 2)</h3>
                        <div class="checkbox-grid" id="planetsGridA">
                            <!-- Checkboxes generated by JS -->
                        </div>
                    </div>

                    <div id="groupBContainer" class="planet-group-box hidden">
                        <h3>Group B (Opposing Group A)</h3>
                        <div class="checkbox-grid" id="planetsGridB">
                            <!-- Checkboxes generated by JS -->
                        </div>
                    </div>
                </div>

                <details class="advanced-section">
                    <summary class="advanced-summary">Advanced</summary>
                    <div class="advanced-content">
                        <label class="planet-label">
                            <input type="checkbox" id="showAspectedPlanetPositions">
                            Show Aspected Planets Position
                        </label>
                        <label class="planet-label">
                            <input type="checkbox" id="showAllPlanetsPosition">
                            Show All Planets Position
                        </label>
                        <label class="planet-label">
                            <input type="checkbox" id="fetchWikiEvents">
                            Fetch Wikipedia historical events (±5 days) for result dates </label>
                    </div>
                </details>

                <button id="findBtn" class="primary-btn">Find Aspects</button>
                <button id="copyLinkBtn" class="secondary-btn">🔗 Copy link to this configuration</button>
                <div id="copyLinkMsg" class="status-msg copy-success hidden">✓ Link copied!</div>
                <div id="statusMessage" class="status-msg hidden">Calculating...</div>
            </section>

            <section class="results-panel glass">
                <div class="results-header">
                    <h2>Results</h2>
                    <button id="downloadCSVBtn" class="download-btn hidden">📥 Download CSV</button>
                </div>
                <div id="resultsStatusMessage" class="status-msg hidden"></div>
                <div id="resultsContent" class="results-content">
                    <p class="placeholder-text">Enter configuration and click Find to see conjunctions.</p>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
